name = "duitku"
main = "src/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]

# Cron triggers (UTC):
# - 01:00 tgl 1 (08:00 WIB) → monthly summary
# - 04:00 Minggu (11:00 WIB) → weekly insights
# - 03:00 setiap hari (10:00 WIB) → budget alerts
[triggers]
crons = ["0 1 1 * *", "0 4 * * SUN", "0 3 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "duitku_db"
database_id = "5a8b911b-1653-49cb-a178-625cbcd3b693"
migrations_dir = "migrations"

[vars]
# Non-secret vars di sini. Secrets pakai `wrangler secret put`
DEFAULT_TIMEZONE = "Asia/Jakarta"
DEFAULT_CURRENCY = "IDR"
GEMINI_MODEL = "gemini-2.5-flash-lite"
MINIAPP_URL = "https://duitku-miniapp.pages.dev"

# Secrets (jangan commit, set via wrangler secret put):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_WEBHOOK_SECRET
#   GEMINI_API_KEY
